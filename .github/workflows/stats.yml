name: "Actualizar Estadísticas del README"

on:
  schedule:
    - cron: "0 3 * * *"   # Actualiza todos los días a las 3 AM
  workflow_dispatch:       # Permite ejecutarlo manualmente

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Generar tarjeta de estadísticas
        uses: readme-tools/github-readme-stats-action@v1
        with:
          card: stats
          options: username=D4NEST&show_icons=true&theme=radical
          path: profile/stats.svg
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Generar tarjeta de lenguajes más usados
        uses: readme-tools/github-readme-stats-action@v1
        with:
          card: top-langs
          options: username=D4NEST&layout=compact&langs_count=6&theme=radical
          path: profile/top-langs.svg
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Confirmar cambios
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add profile/*.svg
          git commit -m "Actualización automática de estadísticas" || exit 0
          git push
